# Vortex Plugin Registry
# Format: [[plugin]] entries — see TEMPLATE.toml for all fields
# To add your plugin: copy TEMPLATE.toml, fill it in, add a [[plugin]] entry here, open a PR.
#
# Checksums are computed from the release WASM binary:
#   sha256sum <name>.wasm
# checksum_sha256_toml is optional — SHA-256 of plugin.toml for manifest integrity.

[[plugin]]
name                 = "vortex-mod-youtube"
description          = "YouTube video/playlist/shorts/channel downloader via yt-dlp"
author               = "vortex-community"
version              = "1.2.4"
category             = "crawler"
repository           = "https://github.com/mpiton/vortex-mod-youtube"
checksum_sha256      = "dbabffc416a24d2decb471ccff7fd440aaa0b4a87ff506ec78d501c30f88cde8"
checksum_sha256_toml = "b5365bd423f7c9f30d60b1b91d95915791eff8324a3f5e220bfae77c8b568d92"
official             = true
# Requires Vortex ≥ 0.2.0 which introduces the `AdaptiveStreamOnly` domain error
# and the `download_to_file` fallback path that this plugin depends on for 1080p+.
min_vortex_version   = "0.2.0"


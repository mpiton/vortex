name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libappindicator3-dev
          librsvg2-dev
          patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Install cargo-llvm-cov and cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-audit

      - name: Security audit
        # wasmtime 41.0.4 (via extism 1.21.0): upstream hasn't released a fix yet
        # rsa 0.9.10 (via sqlx-mysql): no fix available upstream
        # Tracked in src-tauri/audit.toml — remove ignores when upstream updates
        run: >
          cargo audit --file src-tauri/Cargo.lock
          --ignore RUSTSEC-2026-0085
          --ignore RUSTSEC-2026-0086
          --ignore RUSTSEC-2026-0087
          --ignore RUSTSEC-2026-0088
          --ignore RUSTSEC-2026-0089
          --ignore RUSTSEC-2026-0091
          --ignore RUSTSEC-2026-0092
          --ignore RUSTSEC-2026-0093
          --ignore RUSTSEC-2026-0094
          --ignore RUSTSEC-2026-0095
          --ignore RUSTSEC-2026-0096
          --ignore RUSTSEC-2023-0071

      - name: Tests with coverage
        run: >
          cargo llvm-cov
          --manifest-path src-tauri/Cargo.toml
          --workspace
          --lcov
          --output-path lcov.info

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx oxlint .

      - name: Type check
        run: npx tsc -b

      - name: Tests with coverage
        run: npx vitest run --coverage

      - name: Check for secret files
        run: |
          SECRET_FILES=$(git ls-files | grep -iE '\.(env|env\..+|pem|key|p12|pfx|secret|creds)$' || true)
          if [ -n "$SECRET_FILES" ]; then
            echo "::error::Secret files found in repository:"
            echo "$SECRET_FILES"
            exit 1
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: [rust-checks, frontend-checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libappindicator3-dev
          librsvg2-dev
          patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

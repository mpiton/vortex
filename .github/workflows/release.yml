name: Release

on:
  push:
    tags:
      # Glob (NOT regex). `+`/`*` quantifiers are not supported here, so we
      # use `[0-9]*` per segment which matches one-or-more digits in glob.
      - "v[0-9]*.[0-9]*.[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify tag vs Cargo.toml + package.json + CHANGELOG
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Validate semver tag shape
        run: |
          # The trigger glob (`v[0-9]*.[0-9]*.[0-9]*`) is intentionally
          # permissive because `on.push.tags` doesn't support regex
          # quantifiers. A malformed tag like `v1foo.2.3` still fires
          # the workflow, so reject anything that isn't strict semver
          # (with optional `-prerelease` and `+build` suffixes) before
          # the build matrix consumes capacity.
          VERSION='${{ steps.tag.outputs.version }}'
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '${GITHUB_REF}' is not a valid semver release tag (got version='${VERSION}')."
            exit 1
          fi

      - name: Verify Cargo.toml version
        run: |
          CARGO_VERSION=$(grep -m1 '^version' src-tauri/Cargo.toml | cut -d'"' -f2)
          if [ "$CARGO_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) != tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Verify package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) != tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Verify CHANGELOG entry
        run: |
          VERSION='${{ steps.tag.outputs.version }}'
          # Use fixed-string match for version prefix to avoid `.` matching any
          # char (e.g., `1X2X3` accepted by an unescaped regex).
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md \
              && ! grep -qF "## ${VERSION}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no section for version ${VERSION}"
            exit 1
          fi

  create-release:
    name: Create GitHub Release
    needs: verify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify updater pubkey is configured
        run: |
          if grep -q 'REPLACE_BEFORE_FIRST_RELEASE' src-tauri/tauri.conf.json; then
            echo "ERROR: Updater pubkey is still a placeholder."
            echo "Run 'npx tauri signer generate' and update src-tauri/tauri.conf.json"
            exit 1
          fi

      - name: Extract version and changelog
        id: meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          BODY=$(sed -n "/^## \[$VERSION\]/,/^## \[/{ /^## \[$VERSION\]/d; /^## \[/d; p }" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release $VERSION"
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Vortex ${{ github.ref_name }}
          body: ${{ steps.meta.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}

  build-tauri-linux:
    name: Build (Linux)
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libappindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload .rpm to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: src-tauri/target/release/bundle/rpm/*.rpm

      - name: Upload updater bundle to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  build-tauri-macos:
    name: Build (macOS)
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      # Repo-level signing secrets — empty when not configured (beta).
      # The signing/notarize steps are gated behind `env.X != ''` and
      # the APPLE_* vars Tauri actually consumes are only exported via
      # $GITHUB_ENV when MACOS_CERTIFICATE is present, so an empty
      # secret never triggers Tauri's `security import` codepath (which
      # treats any non-null APPLE_CERTIFICATE as "I should sign").
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_KEYCHAIN_PASSWD: ${{ secrets.MACOS_KEYCHAIN_PASSWD }}
      MACOS_CERTIFICATE_PASSWD: ${{ secrets.MACOS_CERTIFICATE_PASSWD }}
      APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import code signing certificate
        if: env.MACOS_CERTIFICATE != ''
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$MACOS_KEYCHAIN_PASSWD" build.keychain
          rm certificate.p12

      - name: Configure Tauri signing env
        if: env.MACOS_CERTIFICATE != ''
        run: |
          {
            echo "APPLE_CERTIFICATE=$MACOS_CERTIFICATE"
            echo "APPLE_CERTIFICATE_PASSWORD=$MACOS_CERTIFICATE_PASSWD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY_SECRET"
          } >> "$GITHUB_ENV"

      - name: Build Tauri app
        run: npx tauri build --target universal-apple-darwin

      - name: Notarize .dmg
        if: env.APPLE_ID != ''
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload .dmg to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload updater bundle to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  build-tauri-windows:
    name: Build (Windows)
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import signing certificate
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $cert = [System.Convert]::FromBase64String("$env:WINDOWS_CERTIFICATE")
          [System.IO.File]::WriteAllBytes("certificate.p12", $cert)

      - name: Build Tauri app
        env:
          WINDOWS_CERTIFICATE_FILE: certificate.p12
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWD }}
          WINDOWS_SIGNING_THUMBPRINT: ${{ secrets.WINDOWS_SIGNING_THUMBPRINT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Clean up certificate
        if: always()
        run: Remove-Item -Path certificate.p12 -ErrorAction SilentlyContinue

      - name: Upload .msi to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload updater bundle to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  publish-flatpak:
    name: Publish Flatpak
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak bundle
        run: |
          mkdir -p _repo
          flatpak-builder --force-clean --repo=_repo --user --install-deps-from=flathub \
            _flatpak_build contrib/flatpak/org.vortex.Vortex.yml
          flatpak build-bundle _repo vortex.flatpak org.vortex.Vortex

      - name: Upload .flatpak to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: vortex.flatpak

  update-updater:
    name: Update updater manifest
    needs: [build-tauri-linux, build-tauri-macos, build-tauri-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download signature files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p sigs
          gh release download "$TAG_NAME" --pattern '*.sig' --dir sigs || true

      - name: Generate latest.json
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/{ /^## \[$VERSION\]/d; /^## \[/d; p }" CHANGELOG.md | head -20)
          REPO="https://github.com/mpiton/vortex"

          # Read signatures from .sig files (each build job uploads specific .sig files)
          LINUX_SIG=$(cat sigs/*.AppImage.sig 2>/dev/null || echo "")
          MACOS_SIG=$(cat sigs/*.app.tar.gz.sig 2>/dev/null || echo "")
          WINDOWS_SIG=$(cat sigs/*.exe.sig 2>/dev/null || echo "")

          # Validate signatures — fail if any are missing
          for sig_name in LINUX_SIG MACOS_SIG WINDOWS_SIG; do
            eval "val=\$$sig_name"
            if [ -z "$val" ]; then
              echo "ERROR: Missing signature: $sig_name"
              exit 1
            fi
          done

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": $(echo "$NOTES" | python3 -c "import sys, json; print(json.dumps(sys.stdin.read().strip()))"),
            "pub_date": "$PUB_DATE",
            "platforms": {
              "linux-x86_64": {
                "url": "$REPO/releases/download/$TAG_NAME/vortex_${VERSION}_amd64.AppImage",
                "signature": "$LINUX_SIG"
              },
              "darwin-universal": {
                "url": "$REPO/releases/download/$TAG_NAME/Vortex.app.tar.gz",
                "signature": "$MACOS_SIG"
              },
              "windows-x86_64": {
                "url": "$REPO/releases/download/$TAG_NAME/Vortex_${VERSION}_x64-setup.exe",
                "signature": "$WINDOWS_SIG"
              }
            }
          }
          EOF

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: latest.json

name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or error logs.

  - type: dropdown
    id: version
    attributes:
      label: Vortex version
      description: Pick the version you reproduced the bug on. `Settings → About` shows the exact version, or run `vortex --version` from the CLI.
      options:
        - v0.2.0-beta (latest beta)
        - main / built from source
        - older / unsure
    validations:
      required: true

  - type: input
    id: build
    attributes:
      label: Exact build / commit SHA
      description: Optional — paste the commit SHA from `Settings → About` for built-from-source installs.
      placeholder: e.g. 98f5124

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem.

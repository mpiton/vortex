# Security audit configuration for cargo-audit.
#
# These advisories are ignored because they affect transitive dependencies
# where the direct dependency (extism, sea-orm) has not yet released a
# version with the fix. We track upstream issues and will remove ignores
# as updates become available.

[advisories]

# wasmtime 41.0.4 (via extism 1.21.0 — latest)
# extism has not released a version using wasmtime >=42.0.2
# Tracking: https://github.com/extism/extism/issues
ignore = [
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0094",
    "RUSTSEC-2026-0095",
    "RUSTSEC-2026-0096",

    # rsa 0.9.10 (via sqlx-mysql → sea-orm)
    # No fixed version available upstream
    "RUSTSEC-2023-0071",
]

app-id: org.vortex.Vortex
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: vortex

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/vortex/cargo
    npm_config_cache: /run/build/vortex/npm-cache

modules:
  - name: webkit2gtk
    buildsystem: simple
    build-commands: []
    sources: []
    # webkit2gtk-4.1 is provided by the runtime

  - name: vortex
    buildsystem: simple
    build-options:
      build-args:
        # Flathub submission requires offline sources via
        # flatpak-node-generator + cargo-vendor; until that work lands,
        # the GitHub Actions Flatpak job needs network access during the
        # build to fetch npm and crates.io dependencies.
        - --share=network
      env:
        CARGO_TARGET_DIR: /run/build/vortex/cargo-target
    build-commands:
      - npm ci
      - npm run build
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 /run/build/vortex/cargo-target/release/vortex /app/bin/vortex
      - install -Dm644 contrib/vortex.desktop /app/share/applications/org.vortex.Vortex.desktop
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/org.vortex.Vortex.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/org.vortex.Vortex.png
    sources:
      - type: dir
        path: ../..

app-id: org.vortex.Vortex
# GNOME Platform bundles WebKitGTK 4.1 + libsoup3 + javascriptcoregtk
# out of the box, which `org.freedesktop.Platform` does not. Tauri 2's
# webview hard-requires those libraries, so following the upstream
# Tauri Flatpak guide we base on `org.gnome.Platform/47`. The
# freedesktop node22 extension still works under the GNOME runtime
# because GNOME's SDK is built on top of freedesktop's.
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
# `rust-stable` extension on 24.08 currently ships rustc < 1.91, which
# is below the toolchain MSRV the wasmtime/extism dependency tree
# requires. We install the matching toolchain via rustup at build time
# instead so the build always tracks the same Rust version pinned in
# `src-tauri/rust-toolchain.toml` / Cargo.toml `rust-version`.
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22

command: vortex

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

build-options:
  append-path: /run/build/vortex/cargo/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/vortex/cargo
    RUSTUP_HOME: /run/build/vortex/rustup
    npm_config_cache: /run/build/vortex/npm-cache

modules:
  - name: webkit2gtk
    buildsystem: simple
    build-commands: []
    sources: []
    # webkit2gtk-4.1 is provided by the runtime

  - name: vortex
    buildsystem: simple
    build-options:
      build-args:
        # Flathub submission requires offline sources via
        # flatpak-node-generator + cargo-vendor; until that work lands,
        # the GitHub Actions Flatpak job needs network access during the
        # build to fetch npm, rustup and crates.io dependencies.
        - --share=network
      env:
        CARGO_TARGET_DIR: /run/build/vortex/cargo-target
    build-commands:
      # Install the project-pinned Rust toolchain via rustup. The
      # rust-stable SDK extension is too old to compile the wasmtime/
      # extism crates that require rustc 1.91+.
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --profile minimal --default-toolchain 1.95.0
      - npm ci
      - npm run build
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 /run/build/vortex/cargo-target/release/vortex /app/bin/vortex
      - install -Dm644 contrib/vortex.desktop /app/share/applications/org.vortex.Vortex.desktop
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/org.vortex.Vortex.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/org.vortex.Vortex.png
    sources:
      - type: dir
        path: ../..
